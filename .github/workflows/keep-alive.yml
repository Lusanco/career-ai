name: Keep HF Space Warm
on:
  schedule:
    - cron: '0 */40 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://lasc1026-career-ai.hf.space" \
            || echo "Ping failed (expected if space is waking up)"
